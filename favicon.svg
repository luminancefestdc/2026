<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Neon Gradient -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark E-Sports Hexagon Background -->
  <polygon points="256,24 480,132 480,380 256,488 32,380 32,132" fill="#0f0f13" stroke="#1f1f27" stroke-width="16"/>
  
  <!-- Aggressive Stylized 'L' -->
  <path d="M 190 140 L 260 140 L 230 300 L 360 300 L 330 370 L 160 370 Z" fill="url(#neon)" filter="url(#glow)"/>
</svg>
